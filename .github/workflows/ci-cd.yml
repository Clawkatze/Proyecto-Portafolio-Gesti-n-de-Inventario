name: CI/CD - Inventory Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Tests
  # ─────────────────────────────────────────
  test:
    name: Correr tests
    runs-on: ubuntu-latest

    # Base de datos PostgreSQL temporal solo para los tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inventory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cachear dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Correr tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: mvn test --no-transfer-progress

      - name: Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ─────────────────────────────────────────
  # JOB 2: Build
  # ─────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test  # Solo corre si los tests pasaron

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cachear dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Empaquetar JAR
        run: mvn package -DskipTests --no-transfer-progress

      - name: Guardar JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

  # ─────────────────────────────────────────
  # JOB 3: Deploy
  # Solo corre en push a main (no en PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      # ── Opción A: Railway ──────────────────────────────────────────────
      # Descomenta este bloque si usas Railway
      # - name: Deploy en Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: inventory-backend

      # ── Opción B: Render ───────────────────────────────────────────────
      # Descomenta este bloque si usas Render
      # - name: Deploy en Render
      #   run: |
      #     curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # ── Opción C: VPS con SSH ──────────────────────────────────────────
      # Descomenta este bloque si tienes un VPS propio
      # - name: Deploy en VPS via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     key: ${{ secrets.VPS_SSH_KEY }}
      #     script: |
      #       systemctl stop inventory-backend || true
      #       cp ~/artifact/*.jar /opt/inventory/app.jar
      #       systemctl start inventory-backend

      # Placeholder hasta que elijas plataforma
      - name: Deploy pendiente de configurar
        run: |
          echo "JAR generado correctamente en ./artifact"
          echo "Descomenta la opción de deploy que corresponda en este archivo"
          ls -lh ./artifact/

  # ─────────────────────────────────────────
  # JOB 4: Notificación
  # Corre siempre, sin importar si falló
  # ─────────────────────────────────────────
  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name: Resultado del pipeline
        run: |
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"

      # Alternativa: notificación por email via GitHub nativo
      # GitHub ya envía emails automáticos cuando un workflow falla.
      # No necesitas configurar nada extra para eso.
